  <rect x="12" y="28" width="8" height="6" rx="2" fill="#451a03" opacity="0.6" />
  <rect x="40" y="24" width="12" height="8" rx="3" fill="#451a03" opacity="0.6" />
  <rect x="24" y="44" width="10" height="6" rx="2" fill="#451a03" opacity="0.6" />
  <rect x="48" y="48" width="6" height="4" rx="1.5" fill="#451a03" opacity="0.6" />
